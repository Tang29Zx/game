<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#13241b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="&#20116;&#23376;&#26827; AI &#26827;&#38498;">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <title>&#20116;&#23376;&#26827; AI &#26827;&#38498;</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #13241b;
      --felt: #1f3a2b;
      --felt-dark: #0e1b14;
      --panel: #f6ecd7;
      --surface: #fff7e9;
      --surface-strong: #ead6b7;
      --line: #9b7a52;
      --text: #2a1b0f;
      --muted: #735d43;
      --accent: #9e4f24;
      --accent-strong: #c7772f;
      --jade: #2f7a4f;
      --ink: #111318;
      --danger: #a33a2c;
      --success: #2f7a4f;
      --shadow: 0 8px 24px rgba(24, 18, 10, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }

    button, select {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      padding: 0 10px;
      touch-action: manipulation;
    }

    button:active { transform: translateY(1px); }
    button:disabled, select:disabled {
      opacity: 0.48;
      transform: none;
    }

    button:focus-visible, select:focus-visible {
      outline: 2px solid var(--accent-strong);
      outline-offset: 2px;
    }

    .app {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background:
        radial-gradient(circle at 50% -10%, rgba(207, 166, 89, 0.2), transparent 32%),
        radial-gradient(circle at 12% 82%, rgba(47, 122, 79, 0.42), transparent 28%),
        repeating-linear-gradient(38deg, rgba(255, 255, 255, 0.028) 0 1px, transparent 1px 7px),
        repeating-linear-gradient(128deg, rgba(0, 0, 0, 0.06) 0 1px, transparent 1px 9px),
        var(--bg);
    }

    .topbar, .bottombar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: calc(10px + env(safe-area-inset-top)) 12px 10px;
      border-bottom: 1px solid rgba(155, 122, 82, 0.45);
      background:
        linear-gradient(180deg, rgba(255, 250, 236, 0.98), rgba(236, 218, 187, 0.96));
      backdrop-filter: blur(14px);
      z-index: 3;
    }

    .topbar {
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.38);
    }

    .bottombar {
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }

    .mark {
      width: 28px;
      height: 28px;
      flex: 0 0 auto;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 30%, #fff6d8 0 11%, transparent 12%),
        radial-gradient(circle at 50% 52%, #21150c 0 49%, transparent 50%),
        #c8924a;
      box-shadow: 0 0 0 2px rgba(158, 79, 36, 0.18);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      margin-top: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(79, 195, 138, 0.12);
    }

    .app.is-thinking .status-dot {
      background: var(--accent-strong);
      box-shadow: 0 0 0 4px rgba(255, 209, 102, 0.14);
      animation: pulse 0.9s ease-in-out infinite;
    }

    .status {
      max-width: 48vw;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    #difficultySelect { max-width: 112px; }

    .workspace {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 0;
      min-height: 0;
      overflow: hidden;
      transition: grid-template-columns 180ms ease;
    }

    .app.inspector-open .workspace {
      grid-template-columns: minmax(0, 1fr) minmax(320px, 360px);
    }

    .panel-toggle {
      font-weight: 650;
    }

    .inspector-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
      border-left: 1px solid rgba(155, 122, 82, 0.35);
      background:
        linear-gradient(180deg, rgba(255, 250, 239, 0.97), rgba(235, 215, 182, 0.96));
      box-shadow: -12px 0 32px rgba(7, 14, 10, 0.22);
      transform: translateX(100%);
      transition: transform 180ms ease;
      z-index: 4;
    }

    .app.inspector-open .inspector-panel {
      transform: translateX(0);
    }

    .inspector-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid rgba(155, 122, 82, 0.38);
    }

    .inspector-title {
      min-width: 0;
    }

    .inspector-title strong {
      display: block;
      font-size: 15px;
      line-height: 1.2;
    }

    .inspector-title span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .inspector-body {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 10px 12px 12px;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .modebar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 0;
      z-index: 1;
    }

    .mode-tab {
      min-height: 44px;
      border-color: rgba(155, 122, 82, 0.55);
      background: rgba(255, 247, 233, 0.72);
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .mode-tab.active {
      border-color: rgba(158, 79, 36, 0.55);
      background: var(--accent);
      color: #fff8ea;
      box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.18);
    }

    .board-area {
      position: relative;
      display: block;
      overflow: hidden;
      min-height: 0;
      isolation: isolate;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(255, 236, 178, 0.13), transparent 38%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 42%),
        linear-gradient(115deg, rgba(255, 255, 255, 0.025), transparent 50%),
        var(--felt-dark);
    }

    #boardCanvas {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: block;
      background: var(--felt-dark);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      cursor: crosshair;
      image-rendering: auto;
    }

    #boardCanvas:focus {
      outline: none;
    }

    html.keyboard-input #boardCanvas:focus {
      outline: 3px solid rgba(199, 119, 47, 0.9);
      outline-offset: -6px;
    }

    .board-hud {
      position: static;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 0;
    }

    .hud-item, .thinking-badge {
      min-width: 0;
      border: 1px solid rgba(119, 83, 43, 0.18);
      border-radius: 8px;
      background: rgba(255, 247, 233, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hud-item {
      padding: 8px 10px;
    }

    .hud-item span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
    }

    .hud-item strong {
      display: block;
      margin-top: 3px;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .thinking-badge {
      position: absolute;
      left: 50%;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      line-height: 1;
      transform: translateX(-50%);
      z-index: 2;
    }

    .study-panel, .explain-card {
      position: static;
      border: 1px solid rgba(119, 83, 43, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.52), transparent 42%),
        rgba(255, 247, 233, 0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .study-panel {
      margin: 0;
      overflow: visible;
      padding: 10px;
    }

    .study-panel[hidden], .explain-card[hidden] {
      display: none;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-head strong {
      display: block;
      font-size: 15px;
      line-height: 1.2;
    }

    .panel-head span, .explain-card p, .review-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .puzzle-rail {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .puzzle-rail button {
      min-height: 38px;
      padding: 0 6px;
      font-size: 12px;
    }

    .puzzle-rail button.active {
      border-color: var(--accent);
      background: rgba(158, 79, 36, 0.12);
      color: var(--accent);
      font-weight: 700;
    }

    .review-controls {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .review-controls button {
      min-width: 44px;
      padding: 0;
      font-weight: 700;
    }

    .explain-card {
      max-width: none;
      overflow: hidden;
      margin: 0;
      padding: 10px 12px;
    }

    .explain-card h2 {
      margin: 0;
      color: var(--accent);
      font-size: 15px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .explain-card p {
      margin: 6px 0 0;
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .top-moves {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .top-moves span {
      border: 1px solid rgba(158, 79, 36, 0.22);
      border-radius: 999px;
      padding: 4px 7px;
      background: rgba(255, 255, 255, 0.38);
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    .thinking-badge[hidden] { display: none; }

    .victory-banner {
      position: absolute;
      left: 50%;
      top: 16px;
      z-index: 6;
      width: min(520px, calc(100% - 32px));
      transform: translateX(-50%);
      padding: 14px 18px;
      border: 1px solid rgba(255, 226, 140, 0.76);
      border-radius: 14px;
      color: #fff8df;
      text-align: center;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 225, 112, 0.34), transparent 54%),
        linear-gradient(135deg, rgba(41, 25, 8, 0.92), rgba(119, 56, 14, 0.86));
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.34),
        0 0 42px rgba(255, 198, 84, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(14px);
      animation: victoryIn 360ms cubic-bezier(.2,.9,.2,1);
    }

    .victory-banner[hidden] { display: none; }

    .victory-kicker {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      color: rgba(255, 229, 151, 0.86);
    }

    .victory-title {
      display: block;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 2px 0 rgba(42, 19, 4, 0.8), 0 0 24px rgba(255, 218, 112, 0.42);
    }

    .victory-subtitle {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255, 248, 223, 0.88);
    }

    .app.has-winner .status-dot {
      background: #ffd95d;
      box-shadow: 0 0 0 4px rgba(255, 217, 93, 0.18), 0 0 18px rgba(255, 217, 93, 0.42);
    }

    @keyframes victoryIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-18px) scale(0.96); }
      to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }

    .zoom-controls {
      position: absolute;
      right: 14px;
      bottom: 14px;
      display: flex;
      gap: 6px;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(255, 247, 233, 0.82);
      backdrop-filter: blur(10px);
      z-index: 2;
    }

    .zoom-controls button {
      min-width: 44px;
      min-height: 44px;
    }

    .stats {
      min-width: 0;
      flex: 1;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .toggle-btn.active {
      border-color: rgba(158, 79, 36, 0.48);
      background: rgba(158, 79, 36, 0.14);
      color: var(--accent);
      font-weight: 700;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.32); opacity: 0.72; }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }

    @media (max-width: 420px) {
      .topbar, .bottombar {
        padding-left: 10px;
        padding-right: 10px;
        gap: 8px;
      }
      button, select {
        min-height: 44px;
        padding: 0 8px;
        font-size: 14px;
      }
      h1 { font-size: 17px; }
      .status { max-width: 40vw; }
      .actions {
        gap: 6px;
      }
      #difficultySelect {
        max-width: 88px;
      }
      .panel-toggle {
        min-width: 44px;
      }
      .board-hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }
      .hud-item {
        padding: 7px 8px;
      }
      .hud-item.optional {
        display: none;
      }
      .hud-item strong {
        font-size: 13px;
      }
      .study-panel {
        margin: 0;
      }
      .puzzle-rail {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .explain-card {
        max-height: 86px;
      }
    }

    @media (max-width: 760px) {
      .workspace {
        grid-template-columns: minmax(0, 1fr);
      }
      .app.inspector-open .workspace {
        grid-template-columns: minmax(0, 1fr);
      }
      .inspector-panel {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: min(44dvh, 400px);
        max-height: min(46dvh, 420px);
        min-height: 0;
        border-top: 1px solid rgba(155, 122, 82, 0.42);
        border-left: 0;
        border-radius: 14px 14px 0 0;
        background:
          linear-gradient(180deg, rgba(255, 250, 239, 0.985), rgba(235, 215, 182, 0.98));
        box-shadow: 0 -16px 32px rgba(7, 14, 10, 0.28);
        touch-action: pan-y;
        transform: translateY(calc(100% - 0px));
      }
      .app.inspector-open .inspector-panel {
        transform: translateY(0);
      }
      .inspector-body {
        max-height: calc(100% - 60px);
        touch-action: pan-y;
      }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      .app {
        grid-template-rows: auto minmax(0, 1fr);
      }
      .workspace,
      .app.inspector-open .workspace {
        grid-template-columns: minmax(0, 1fr);
      }
      .inspector-panel {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: min(38dvh, 176px);
        max-height: min(38dvh, 176px);
        min-height: 0;
        border-top: 1px solid rgba(155, 122, 82, 0.42);
        border-left: 0;
        border-radius: 14px 14px 0 0;
        background:
          linear-gradient(180deg, rgba(255, 250, 239, 0.985), rgba(235, 215, 182, 0.98));
        box-shadow: 0 -16px 32px rgba(7, 14, 10, 0.28);
        touch-action: pan-y;
        transform: translateY(calc(100% - 0px));
      }
      .app.inspector-open .inspector-panel {
        transform: translateY(0);
      }
      .inspector-body {
        max-height: calc(100% - 52px);
        padding-top: 8px;
        padding-bottom: 8px;
        gap: 8px;
        touch-action: pan-y;
      }
      .topbar {
        padding: calc(4px + env(safe-area-inset-top)) 8px 4px;
        gap: 8px;
      }
      .mark {
        width: 22px;
        height: 22px;
      }
      h1 {
        font-size: 15px;
      }
      .status {
        font-size: 11px;
        max-width: 32vw;
      }
      .actions {
        gap: 6px;
      }
      button, select {
        min-height: 44px;
        padding: 0 7px;
        font-size: 14px;
      }
      #difficultySelect {
        max-width: 92px;
      }
      .bottombar {
        display: none;
      }
      .zoom-controls {
        right: 10px;
        bottom: 10px;
      }
      .victory-banner {
        top: 10px;
        width: min(460px, calc(100% - 20px));
        padding: 10px 12px;
      }
      .victory-subtitle {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <span class="mark"></span>
        <div>
          <h1>&#20116;&#23376;&#26827; AI &#26827;&#38498;</h1>
          <div class="status-row">
            <span class="status-dot" aria-hidden="true"></span>
            <div id="statusText" class="status" aria-live="polite">&#40657;&#26827;&#22238;&#21512;</div>
          </div>
        </div>
      </div>
      <div class="actions">
        <button id="panelToggleBtn" class="panel-toggle" type="button" aria-label="&#23637;&#24320;&#25110;&#25240;&#21472; AI &#38754;&#26495;" aria-expanded="false" aria-controls="inspectorPanel" title="&#23637;&#24320;&#25110;&#25240;&#21472; AI &#38754;&#26495;">&#38754;&#26495;</button>
        <select id="difficultySelect" aria-label="AI &#24378;&#24230;" title="AI &#24378;&#24230;">
          <option value="legend" selected>&#23447;&#24072;</option>
          <option value="master">&#22825;&#20803;</option>
          <option value="strong">&#39640;&#25163;</option>
          <option value="fast">&#26497;&#36895;</option>
        </select>
        <button id="newGameBtn" type="button" aria-label="&#24320;&#22987;&#26032;&#23616;" title="&#24320;&#22987;&#26032;&#23616;">&#26032;&#23616;</button>
      </div>
    </header>

    <div class="workspace">
      <section class="board-area">
        <canvas id="boardCanvas" tabindex="0" role="application" aria-label="&#20116;&#23376;&#26827;&#26827;&#30424;&#65292;&#28857;&#20987;&#33853;&#23376;&#65292;&#25302;&#25341;&#24179;&#31227;&#65292;&#28378;&#36718;&#32553;&#25918;" title="&#28857;&#20987;&#33853;&#23376;&#65292;&#25302;&#25341;&#24179;&#31227;&#65292;&#28378;&#36718;&#32553;&#25918;"></canvas>
        <div id="thinkingBadge" class="thinking-badge" hidden>
          <span class="status-dot" aria-hidden="true"></span>
          <span>AI &#25512;&#29702;&#20013;</span>
        </div>
        <div id="victoryBanner" class="victory-banner" hidden aria-live="assertive">
          <span class="victory-kicker">&#32456;&#23616;&#25104;&#31435;</span>
          <strong id="victoryTitle" class="victory-title">&#32988;&#21033;</strong>
          <span id="victorySubtitle" class="victory-subtitle">&#20116;&#36830;&#33853;&#23450;</span>
        </div>
        <div class="zoom-controls">
          <button id="zoomOutBtn" type="button" aria-label="&#32553;&#23567;&#26827;&#30424;" title="&#32553;&#23567;&#26827;&#30424;">-</button>
          <button id="fitBtn" type="button" aria-label="&#36866;&#37197;&#26827;&#30424;" title="&#36866;&#37197;&#26827;&#30424;">&#36866;&#23631;</button>
          <button id="zoomInBtn" type="button" aria-label="&#25918;&#22823;&#26827;&#30424;" title="&#25918;&#22823;&#26827;&#30424;">+</button>
        </div>
      </section>

      <aside id="inspectorPanel" class="inspector-panel" aria-label="AI &#26827;&#23616;&#38754;&#26495;">
        <div class="inspector-head">

      requestDraw();

      newGameBtn.disabled = thinking;
      undoBtn.disabled = thinking || history.length === 0 || mode !== "play";
      difficultySelect.disabled = thinking;
      centerBtn.disabled = history.length === 0;
      reviewPrevBtn.disabled = reviewIndex <= 0;
      reviewNextBtn.disabled = reviewIndex >= history.length;

      for (const tab of modeTabs) tab.classList.toggle("active", tab.dataset.mode === mode);
      trainingPanel.hidden = mode !== "train";
      reviewPanel.hidden = mode !== "review";
      if (mode === "train") {
        renderPuzzlePanel();

        reviewIndex = Math.max(0, Math.min(history.length, reviewIndex || history.length));
        renderReviewPanel();
      }
      if (mode !== "play") setInspectorOpen(true, { skipSave: true });
      updateUiState();
      syncCanvasAfterLayout();
    }

      if (thinking) return;
      mode = nextMode;
      if (mode === "play") {
        reviewIndex = history.length;

        if (winner && last) showVictoryBanner(winner, last[0], last[1]);
        else hideVictoryBanner();

        loadPuzzle(currentPuzzleId, { keepMode: true });

        reviewIndex = history.length;

      const n = Number(value || 0);
      if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
      if (n >= 1000) return (n / 1000).toFixed(1) + "K";
      return n ? String(n) : "--";

    }
